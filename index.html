<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Health Report</title>

    <!-- PDF LIB -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
       
        @media print{
          @page{  size:A4;
            margin:25mm;}
            
        }
        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #f2f4f7;
        }

        /* HEADER */
        .header {
            position: relative;
            top: 0;
            background: #fff;
            padding: 14px 0;
            text-align: center;
            border-bottom: 1px solid #e5e5e5;
        }

        .menu {
            position: absolute;
            left: 15px;
            top: 14px;
            width: 28px;
        }

        .menu div {
            height: 4px;
            background: #49bcd3;
            margin: 5px 0;
            border-radius: 2px;
        }

        .logo {
            font-size: 18px;
            color: #6c78a0;
            font-weight: 700;
        }

        /* BOX INFO */
     .info {
            margin: 12px;
            border: 3px solid #49bcd3;
            background: #fff;
            padding: 12px;
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 15px;
        }

        .item {
            font-size: 13px;
            color: #666;
        }

        .item b {
            display: block;
            color: #333;
            font-weight: 500;
        }

        .value {
            color: #1e88e5;
            font-weight: 700;
            margin-top: 2px;
        }

        /* BUTTON */
        .pdf {
            position: absolute;
            right: 12px;
            top: 12px;
            background: #e53935;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }  
      
        
        /* MOBILE */
       @media(max-width:768px){}

   

        

        /* CONTENT EXPORT */
        #content {
            width: 210mm;
            min-height: 297mm;
            margin: auto;
            background: white;
        }

        /* TITLE */
        .title {
            margin: 12px;
            background: #e9f6f8;
            border-left: 6px solid #49bcd3;
            padding: 12px;
            font-weight: 700;
            text-align: center;
        }

        .container {
            text-align: center;
            margin:  0;
        }

        .img-2 {
            width: 210mm;
            height: auto;
            display: block;
        }

        .img-3 {
            width: 195mm;
            height: auto;
            display: block;
            margin: 10px auto;
        }

        #in {
            width: 210mm;
            height: auto;
            margin: auto;
            background: white;
            display: block;
        }

        .img0 {
            width: 190mm;
            height: auto;
            display: block;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .page-break {
            break-after: page;
            page-break-after: always;
        }

        .noi {
            margin: 0;
        }
    </style>
</head>

<body>




    <!-- HEADER -->
    <div class="header">
        <div class="menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="logo">FATIMA HOSPITAL</div>
    </div>

    <!-- INFO -->
    <div class="info">
        <div class="grid">
            <div class="item">
                <b>성명(Name)</b>
                <div class="value">황반딘</div>
            </div>

            <div class="item">
                <b>생년월일(Birth)</b>
                <div class="value">20020201</div>
            </div>

            <div class="item">
                <b>나이/성별(Age/Sex)</b>
                <div class="value">24 / 남</div>
            </div>

            <div class="item">
                <b>검진일(Exam Date)</b>
                <div class="value">2026년 02월 02일</div>
            </div>

            <div class="item">
                <b>등록번호(Chart No.)</b>
                <div class="value">89110861</div>
            </div>
        </div>

        <!-- BUTTON -->
        <button class="pdf" onclick="savePDF()">PDF 저장</button>



    </div>
    <div id="content">

        <div class="container">
         <div class="page page-break">
            <div class="noi">
                <img src="anh1.png" class="img-2">


                <img src="anh2.png" class="img-2">
         </div>
         </div>
            <img src="anh3.png" class="img-2">
         
     </div>
    </div>

</body>

<script>
    function savePDF() {
        const btn = document.querySelector(".pdf");
        btn.style.visibility = "hidden";

        const images = document.querySelectorAll("img");

        Promise.all([...images].map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => {
                img.onload = img.onerror = resolve;
            });
        }))
            .then(() => {
                const element = document.getElementById("content");

                return html2pdf().set({
                    margin: [6,0,10,0],
                    filename: 'health_report.pdf',
                    image: { type: 'jpeg', quality: 1 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true
                    },
                    jsPDF: {
                        unit: 'mm',
                        format: 'a4',
                        orientation: 'portrait'
                    }
                }).from(element).save();
            })
            .catch(err => {
                console.error("PDF lỗi:", err);
                alert("Xuất PDF lỗi, mở Console để xem chi tiết");
            })
            .finally(() => {
                btn.style.visibility = "visible";
            });
    }
</script>



</html>
